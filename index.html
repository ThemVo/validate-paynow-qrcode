<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayNow QR Validator</title>
    <meta name="description" content="Validate PayNow SGQR codes by uploading a QR image or entering the data string">
    <!-- Content Security Policy: restrict resource origins, prevent clickjacking -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline';
        style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https:;
        connect-src 'self';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    ">
    <!-- Anti-clickjacking fallback for older browsers -->
    <meta http-equiv="X-Frame-Options" content="DENY">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <main class="container">
        <header class="header">
            <div class="logo" id="logo-container">
                <svg id="logo-svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="12" fill="url(#logo-grad)"/>
                    <path d="M12 12h6v6h-6zM22 12h6v6h-6zM12 22h6v6h-6zM24 24h4v4h-4z" fill="white" opacity="0.9"/>
                    <path d="M22 22h2v2h-2z" fill="white" opacity="0.5"/>
                    <defs>
                        <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40">
                            <stop stop-color="#6366f1"/>
                            <stop offset="1" stop-color="#a855f7"/>
                        </linearGradient>
                    </defs>
                </svg>
                <img id="logo-qr-img" src="" alt="QR Code" style="display:none;width:375px;height:375px;object-fit:contain;">
            </div>
            <h1>PayNow QR Validator</h1>
            <p class="subtitle">Upload a QR image or paste the data string to validate EMVCo / SGQR compliance</p>
        </header>

        <section class="input-section">
            <div class="input-card">
                <!-- Tabs -->
                <div class="input-tabs">
                    <button type="button" class="tab-btn active" id="tab-upload" data-tab="upload">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        Upload Image
                    </button>
                    <button type="button" class="tab-btn" id="tab-text" data-tab="text">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="4 7 4 4 20 4 20 7"></polyline>
                            <line x1="9" y1="20" x2="15" y2="20"></line>
                            <line x1="12" y1="4" x2="12" y2="20"></line>
                        </svg>
                        Paste String
                    </button>
                </div>

                <!-- Upload Tab Content -->
                <div class="tab-content active" id="content-upload">
                    <div class="drop-zone" id="drop-zone">
                        <input type="file" id="file-input" accept="image/*" hidden>
                        <div class="drop-zone-prompt" id="drop-zone-prompt">
                            <div class="drop-zone-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                            </div>
                            <p class="drop-zone-text">Drag & drop a QR image here</p>
                            <p class="drop-zone-subtext">or <button type="button" class="browse-link" id="browse-btn">browse files</button></p>
                            <p class="drop-zone-hint">Supports PNG, JPG, WEBP, GIF</p>
                        </div>
                        <div class="drop-zone-preview" id="drop-zone-preview" style="display:none;">
                            <img id="preview-img" src="" alt="QR Preview">
                            <button type="button" class="remove-img-btn" id="remove-img-btn" title="Remove image">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                            <div class="decoded-badge" id="decoded-badge" style="display:none;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                QR Decoded
                            </div>
                        </div>
                    </div>
                    <div class="decode-status" id="decode-status" style="display:none;"></div>
                </div>

                <!-- Text Tab Content -->
                <div class="tab-content" id="content-text">
                    <textarea 
                        id="qr-input" 
                        class="qr-textarea" 
                        placeholder="e.g. 00020101021226460009SG.PAYNOW010120211201419712M0103010530370254..."
                        rows="4"
                        spellcheck="false"
                    ></textarea>
                    <span class="char-count" id="char-count">0 characters</span>
                </div>

                <!-- Shared Footer -->
                <div class="input-footer">
                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" id="btn-clear">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                            Clear
                        </button>
                        <button type="button" class="btn btn-primary" id="btn-validate">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                            Validate
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="result-section" id="result-section" style="display:none;">
            <div class="result-card" id="result-card">
                <div class="result-header" id="result-header">
                    <div class="result-icon" id="result-icon"></div>
                    <div>
                        <h2 class="result-title" id="result-title"></h2>
                        <p class="result-message" id="result-message"></p>
                    </div>
                </div>

                <!-- PayNow Info Card -->
                <div class="paynow-info-section" id="paynow-info-section" style="display:none;">
                    <h3 class="details-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        PayNow Information
                    </h3>
                    <div class="paynow-info-grid" id="paynow-info-grid"></div>
                </div>

                <div class="result-details" id="result-details" style="display:none;">
                    <h3 class="details-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="3" y1="9" x2="21" y2="9"></line>
                            <line x1="9" y1="21" x2="9" y2="9"></line>
                        </svg>
                        Data Field Details (TLV)
                    </h3>
                    <div class="tags-table-wrapper">
                        <table class="tags-table" id="tags-table">
                            <thead>
                                <tr>
                                    <th>Tag</th>
                                    <th>Name</th>
                                    <th>Length</th>
                                    <th>Value</th>
                                </tr>
                            </thead>
                            <tbody id="tags-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <canvas id="qr-canvas" style="display:none;"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Handle ?qr=<url> param: show QR image instead of SVG logo
        (function () {
            const params = new URLSearchParams(window.location.search);
            const qrUrl = params.get('qr');
            if (qrUrl) {
                // XSS Protection: Only allow safe URL protocols
                let sanitizedUrl = '';
                try {
                    const parsed = new URL(qrUrl, window.location.origin);
                    if (['http:', 'https:', 'data:'].includes(parsed.protocol)) {
                        sanitizedUrl = parsed.href;
                    }
                } catch (e) {
                    // Invalid URL — ignore
                }
                if (!sanitizedUrl) return;

                const logoSvg = document.getElementById('logo-svg');
                const logoQrImg = document.getElementById('logo-qr-img');
                const logoContainer = document.getElementById('logo-container');
                if (logoSvg) logoSvg.style.display = 'none';
                if (logoQrImg) {
                    logoQrImg.src = sanitizedUrl;
                    logoQrImg.style.display = 'block';
                }
                // Adjust header layout for large QR image
                if (logoContainer) {
                    logoContainer.style.display = 'flex';
                    logoContainer.style.justifyContent = 'center';
                    logoContainer.style.width = '100%';
                    // Tắt animation pulse-glow (nền xanh blur)
                    logoContainer.style.animation = 'none';
                    logoContainer.style.filter = 'none';
                }
                const header = document.querySelector('.header');
                if (header) {
                    header.style.flexDirection = 'column';
                    header.style.alignItems = 'center';
                    header.style.textAlign = 'center';
                }
            }
        })();
    </script>
</body>
</html>
